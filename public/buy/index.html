<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Checkout | qmtk Soccer</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22a24d;
      --green-bright: #4ade80;
      --bg: #08100b;
      --bg-card: #111810;
      --bg-raised: #18221b;
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.14);
      --text: #f1f5f2;
      --text-mid: rgba(241,245,242,0.78);
      --text-dim: rgba(241,245,242,0.55);
      --red: #ff8a8a;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at 50% -10%, rgba(34,162,77,0.16) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 110%, rgba(34,162,77,0.08) 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
      line-height: 1.65;
      letter-spacing: -0.011em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    h1, h2, h3 { letter-spacing: -0.02em; line-height: 1.15; }
    a { color: inherit; }

    /* Top nav */
    .buy-nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; max-width: 1100px; margin: 0 auto; }
    .buy-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .buy-brand img { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; }
    .buy-brand .name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.35rem; color: #fff; letter-spacing: -0.02em; }
    .buy-brand .name .suffix { font-weight: 500; opacity: 0.85; margin-left: 0.3em; }
    .buy-back { color: var(--text-dim); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; }
    .buy-back:hover { color: var(--text); }

    /* Centered, single-column layout */
    .buy-wrap { max-width: 560px; margin: 1rem auto 4rem; padding: 0 1.5rem; }

    .buy-eyebrow { display: inline-flex; align-items: center; gap: 6px; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #6fcf97; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; margin-bottom: 1rem; }
    .buy-eyebrow::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--green-bright); box-shadow: 0 0 8px rgba(74,222,128,0.7); }
    .buy-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2rem, 5vw, 2.6rem); font-weight: 800; color: #fff; margin-bottom: 0.5rem; }
    .buy-sub { color: var(--text-mid); font-size: 1rem; margin-bottom: 2rem; }

    /* Single card */
    .buy-card {
      background: var(--bg-raised);
      border: 1px solid var(--border-bright);
      border-radius: 18px;
      padding: 2rem 1.8rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    .price-row { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: 1.4rem; padding-bottom: 1.4rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .price-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; color: #fff; line-height: 1.15; }
    .price-amount { display: flex; align-items: baseline; gap: 0.4rem; }
    .price-amount .amount { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 800; color: #fff; line-height: 1; }
    .price-amount .unit { color: var(--text-mid); font-size: 0.88rem; font-weight: 500; }
    .savings { color: var(--green-bright); font-size: 0.78rem; font-weight: 700; background: rgba(34,162,77,0.13); border: 1px solid rgba(34,162,77,0.35); padding: 3px 10px; border-radius: 100px; align-self: center; }

    .section-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; color: var(--green-bright); margin-bottom: 0.7rem; }
    .features { list-style: none; padding: 0; margin: 0 0 1.6rem; }
    .features li { font-size: 0.95rem; color: var(--text-mid); padding: 0.35rem 0 0.35rem 1.6rem; position: relative; line-height: 1.5; }
    .features li::before { content: "✓"; position: absolute; left: 0; top: 0.35rem; color: var(--green-bright); font-weight: 800; }

    .pay-button {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: var(--green); color: #fff; border: none;
      padding: 1.1rem 1.4rem; border-radius: 12px;
      font-family: inherit; font-weight: 700; font-size: 1.05rem;
      cursor: pointer; transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 10px 28px rgba(34,162,77,0.3);
    }
    .pay-button:hover { background: #1f924a; transform: translateY(-1px); box-shadow: 0 14px 36px rgba(34,162,77,0.4); }
    .pay-button:active { transform: translateY(0); }

    .powered-by-line {
      text-align: center;
      margin-top: 1.1rem;
      color: var(--text-dim);
      font-size: 0.82rem;
      letter-spacing: 0.2px;
    }
    .powered-by-line .sq {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px dotted var(--text-dim);
    }
    .powered-by-line .sq:hover { color: #fff; border-bottom-color: var(--text); }

    .status { margin-top: 1rem; padding: 0.85rem 1rem; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.3); border-radius: 10px; color: #6fcf97; font-size: 0.9rem; text-align: center; line-height: 1.5; }

    .buy-footer { text-align: center; margin-top: 2rem; color: var(--text-dim); font-size: 0.85rem; }
    .buy-footer a { color: #6fcf97; text-decoration: none; font-weight: 600; }
    .buy-footer a:hover { text-decoration: underline; }

    .buy-loading { text-align: center; padding: 5rem 1rem; color: var(--text-dim); }
    .buy-error { background: rgba(226,74,74,0.1); border: 1px solid rgba(226,74,74,0.35); border-radius: 12px; padding: 1.5rem; color: var(--red); text-align: center; }

    /* Success state */
    .success-card { text-align: center; padding: 1rem 0.5rem; }
    .success-icon { width: 80px; height: 80px; margin: 0.5rem auto 1.2rem; border-radius: 50%; background: rgba(74,222,128,0.18); display: flex; align-items: center; justify-content: center; font-size: 2.4rem; border: 2px solid rgba(74,222,128,0.5); }
    .success-card h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.1rem; font-weight: 800; color: #fff; margin-bottom: 0.4rem; }
    .success-card .sub { color: var(--text-mid); font-size: 1rem; margin-bottom: 1.6rem; }
    .success-next { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; margin: 1.2rem 0; text-align: left; font-size: 0.92rem; color: var(--text-mid); }
    .success-next strong { color: #fff; font-weight: 600; }
    .success-actions { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.4rem; }
    .success-actions a { padding: 0.85rem 1.2rem; border-radius: 10px; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: background 0.2s, transform 0.15s; }
    .success-actions .primary { background: var(--green); color: #fff; }
    .success-actions .primary:hover { background: #1f924a; transform: translateY(-1px); }
    .success-actions .secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border-bright); }
    .success-actions .secondary:hover { background: rgba(255,255,255,0.1); }

    .test-banner { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.4); border-radius: 10px; color: #f5a623; padding: 0.7rem 1rem; font-size: 0.85rem; font-weight: 600; text-align: center; margin-bottom: 1.5rem; }

    @media (max-width: 640px) {
      .buy-nav { padding: 1rem 1.2rem; }
      .buy-brand .name { font-size: 1.1rem; }
      .buy-brand img { width: 48px; height: 48px; }
      .buy-card { padding: 1.5rem 1.4rem; border-radius: 16px; }
      .price-row { flex-direction: column; align-items: flex-start; }
      .price-amount .amount { font-size: 2rem; }
    }
  </style>
</head>
<body>

<nav class="buy-nav">
  <a class="buy-brand" href="/">
    <img src="/logo.webp" alt="qmtk Soccer">
    <span class="name">qmtk<span class="suffix">Soccer</span></span>
  </a>
  <a class="buy-back" href="/">← Back to site</a>
</nav>

<main class="buy-wrap" id="buy-root">
  <div class="buy-loading">Loading…</div>
</main>

<script>
  var COPY = {
    intro_call: {
      eyebrow: "Step 1 — Intro Call",
      title: "Reserve your intro call",
      sub: "20-minute call with Coach Shaya. $20 deposit applies in full to your first session.",
      unit: "/ deposit",
      features: [
        "One-on-one with Coach Shaya",
        "We'll talk about goals, level, and the right next step",
        "Deposit applies in full to your first session"
      ]
    },
    private_1: {
      eyebrow: "Private Training",
      title: "1-on-1 session with Coach Shaya",
      sub: "60 minutes of targeted coaching, built around your child's goals. All ages.",
      unit: "/ 60-min session",
      features: [
        "60 minutes of one-on-one coaching",
        "All ages — K through high school",
        "We'll schedule with you after purchase"
      ]
    },
    private_5: {
      eyebrow: "Most Popular",
      title: "Private Training — 5-Pack",
      sub: "Five 60-minute sessions at $80 each. Save $25.",
      unit: "/ 5 sessions",
      saving: "Save $25",
      features: [
        "Five 60-minute private sessions",
        "$80 per session — save $25 vs drop-in",
        "Use anytime — no expiration"
      ]
    },
    private_10: {
      eyebrow: "Best Value",
      title: "Private Training — 10-Pack",
      sub: "Ten 60-minute sessions at $75 each. Save $100.",
      unit: "/ 10 sessions",
      saving: "Save $100",
      features: [
        "Ten 60-minute private sessions",
        "$75 per session — biggest discount",
        "Use anytime — no expiration"
      ]
    },
    gift_50: {
      eyebrow: "Gift Card",
      title: "qmtk Gift Card — $50",
      sub: "Redeemable for any qmtk Soccer service.",
      unit: "",
      features: ["Redeemable for any qmtk service", "Delivered digitally", "No expiration"]
    },
    gift_100: {
      eyebrow: "Gift Card",
      title: "qmtk Gift Card — $100",
      sub: "Redeemable for any qmtk Soccer service.",
      unit: "",
      features: ["Redeemable for any qmtk service", "Delivered digitally", "No expiration"]
    },
    gift_200: {
      eyebrow: "Gift Card",
      title: "qmtk Gift Card — $200",
      sub: "Redeemable for any qmtk Soccer service.",
      unit: "",
      features: ["Redeemable for any qmtk service", "Delivered digitally", "No expiration"]
    }
  };

  var STATE = { product: null, copy: null, env: null, popup: null, pollHandle: null, completed: false };

  function dollars(c) { return "$" + (c / 100).toLocaleString(); }
  function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function param(k) { return new URLSearchParams(window.location.search).get(k); }
  function track(e, p) { if (typeof fbq !== "undefined") fbq("track", e, p || {}); }

  function init() {
    var key = param("p");
    if (!key || !COPY[key]) {
      document.getElementById("buy-root").innerHTML = '<div class="buy-error">Product not found. <a href="/" style="color:#6fcf97;">Return to the homepage</a> to browse our offerings.</div>';
      return;
    }
    STATE.copy = COPY[key];

    fetch("/square-products.json", { cache: "no-store" })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var product = (data.products || []).find(function(p) { return p.key === key; });
        if (!product) throw new Error("Product not in catalog");
        STATE.product = product;
        STATE.env = data.env === "sandbox" ? "sandbox" : "production";
        render();
        window.addEventListener("message", onPopupMessage);
      })
      .catch(function(err) {
        console.error(err);
        document.getElementById("buy-root").innerHTML = '<div class="buy-error">Checkout is temporarily unavailable. Please <a href="mailto:noah@qmtk.org" style="color:#6fcf97;">email Coach Shaya</a> and we\'ll set you up directly.</div>';
      });
  }

  function render() {
    var p = STATE.product;
    var c = STATE.copy;
    document.getElementById("page-title").textContent = p.name + " | qmtk Soccer";

    var savingHtml = c.saving ? '<span class="savings">' + escapeHtml(c.saving) + '</span>' : "";
    var testBanner = STATE.env === "sandbox" ? '<div class="test-banner">🧪 Test mode — payments are sandbox only, no real card will be charged.</div>' : "";
    var features = c.features.map(function(f) { return "<li>" + escapeHtml(f) + "</li>"; }).join("");

    document.getElementById("buy-root").innerHTML = ''
      + testBanner
      + '<div class="buy-eyebrow">' + escapeHtml(c.eyebrow) + '</div>'
      + '<h1 class="buy-title">' + escapeHtml(c.title) + '</h1>'
      + '<p class="buy-sub">' + escapeHtml(c.sub) + '</p>'
      + '<div class="buy-card">'
      +   '<div class="price-row">'
      +     '<div class="price-name">' + escapeHtml(p.name) + '</div>'
      +     '<div class="price-amount">'
      +       '<span class="amount">' + dollars(p.price_cents) + '</span>'
      +       '<span class="unit">' + escapeHtml(c.unit || "") + '</span>'
      +       savingHtml
      +     '</div>'
      +   '</div>'
      +   '<div class="section-label">What\'s included</div>'
      +   '<ul class="features">' + features + '</ul>'
      +   '<button type="button" class="pay-button" id="pay-button">'
      +     'Pay ' + dollars(p.price_cents) + ' securely with Square →'
      +   '</button>'
      +   '<div id="status-box"></div>'
      +   '<p class="powered-by-line">Secure checkout · payments processed by <a href="https://squareup.com" target="_blank" rel="noopener" class="sq">Square</a></p>'
      + '</div>'
      + '<div class="buy-footer">Questions? <a href="mailto:noah@qmtk.org">Email Coach Shaya</a> &middot; <a href="/">Back to qmtk.org</a></div>';

    document.getElementById("pay-button").addEventListener("click", openCheckoutPopup);
    track("InitiateCheckout", {
      content_name: p.name,
      content_category: p.key.indexOf("gift_") === 0 ? "Gift Card" : (p.key === "intro_call" ? "Intro Call" : "Private Training"),
      value: p.price_cents / 100,
      currency: "USD"
    });
  }

  function openCheckoutPopup() {
    var p = STATE.product;
    var w = 520, h = 760;
    var left = Math.max(0, (screen.width - w) / 2);
    var top = Math.max(0, (screen.height - h) / 2);
    var features = "width=" + w + ",height=" + h + ",left=" + left + ",top=" + top
                  + ",scrollbars=yes,resizable=yes,toolbar=no,menubar=no,location=yes,status=no";
    STATE.popup = window.open(p.checkout_url, "qmtk_square_checkout", features);

    if (!STATE.popup || STATE.popup.closed) {
      // Popup blocked — open in a new tab instead
      window.open(p.checkout_url, "_blank", "noopener");
      showStatus("Your browser blocked the popup, so we opened Square's checkout in a new tab. Complete payment there and come back to this page.");
      return;
    }

    showStatus("Secure Square checkout opened. Complete your payment in the window — this page will update when you're done.");
    STATE.popup.focus();

    if (STATE.pollHandle) clearInterval(STATE.pollHandle);
    STATE.pollHandle = setInterval(function() {
      if (STATE.popup && STATE.popup.closed) {
        clearInterval(STATE.pollHandle);
        STATE.pollHandle = null;
        if (!STATE.completed) {
          showStatus("Window closed. If you completed payment you'll get a receipt by email shortly — otherwise, click \"Pay\" again to retry.", true);
        }
      }
    }, 600);
  }

  function onPopupMessage(e) {
    if (e.origin !== window.location.origin) return;
    var data = e.data || {};
    if (data && data.type === "qmtk-purchase-success") {
      STATE.completed = true;
      if (STATE.pollHandle) { clearInterval(STATE.pollHandle); STATE.pollHandle = null; }
      if (STATE.popup && !STATE.popup.closed) { try { STATE.popup.close(); } catch (_) {} }
      track("Purchase", {
        content_name: STATE.product.name,
        content_category: STATE.product.key.indexOf("gift_") === 0 ? "Gift Card" : (STATE.product.key === "intro_call" ? "Intro Call" : "Private Training"),
        value: STATE.product.price_cents / 100,
        currency: "USD"
      });
      showSuccess();
    }
  }

  function showStatus(msg, neutral) {
    var el = document.getElementById("status-box");
    if (!el) return;
    var cls = neutral ? "status" : "status";
    el.innerHTML = '<div class="' + cls + '"' + (neutral ? ' style="background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12);color:var(--text-mid);"' : '') + '>' + escapeHtml(msg) + '</div>';
  }

  function showSuccess() {
    var p = STATE.product;
    var nextStepsMap = {
      intro_call: "Coach Shaya will reach out within 24 hours at the email you provided to schedule your intro call.",
      private_1:  "Coach Shaya will reach out within 24 hours to schedule your session at a time and location that works for your family.",
      private_5:  "Coach Shaya will reach out within 24 hours to schedule your first session. You can book the rest one at a time.",
      private_10: "Coach Shaya will reach out within 24 hours to schedule your first session. Book the rest at your pace.",
      gift_50:    "Email noah@qmtk.org with the recipient's name and email and we'll send a personalized gift card.",
      gift_100:   "Email noah@qmtk.org with the recipient's name and email and we'll send a personalized gift card.",
      gift_200:   "Email noah@qmtk.org with the recipient's name and email and we'll send a personalized gift card."
    };
    var nextSteps = nextStepsMap[p.key] || "Coach Shaya will reach out shortly.";

    document.getElementById("buy-root").innerHTML = ''
      + '<div class="buy-card">'
      +   '<div class="success-card">'
      +     '<div class="success-icon">⚽</div>'
      +     '<h2>You\'re in!</h2>'
      +     '<p class="sub">' + escapeHtml(p.name) + ' &middot; ' + dollars(p.price_cents) + ' charged. Receipt emailed by Square.</p>'
      +     '<div class="success-next">'
      +       '<strong>What happens next:</strong> ' + escapeHtml(nextSteps)
      +     '</div>'
      +     '<div class="success-actions">'
      +       '<a class="primary" href="/">Back to qmtk.org</a>'
      +       '<a class="secondary" href="mailto:noah@qmtk.org">Email Coach Shaya</a>'
      +     '</div>'
      +   '</div>'
      + '</div>';
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  init();
</script>
