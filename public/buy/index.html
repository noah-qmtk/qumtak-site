<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Checkout | qmtk Soccer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22a24d;
      --green-bright: #4ade80;
      --green-deep: #14532d;
      --bg: #08100b;
      --bg-card: #111810;
      --bg-raised: #18221b;
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.14);
      --text: #f1f5f2;
      --text-mid: rgba(241,245,242,0.78);
      --text-dim: rgba(241,245,242,0.55);
      --red: #ff8a8a;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at 50% -10%, rgba(34,162,77,0.16) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 110%, rgba(34,162,77,0.08) 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
      line-height: 1.65;
      letter-spacing: -0.011em;
      font-feature-settings: 'ss01' on, 'cv11' on, 'kern' on;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    h1, h2, h3 { letter-spacing: -0.02em; line-height: 1.1; }
    a { color: inherit; }

    .buy-nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; max-width: 1100px; margin: 0 auto; }
    .buy-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .buy-brand img { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; }
    .buy-brand .name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.35rem; color: #fff; letter-spacing: -0.02em; }
    .buy-brand .name .suffix { font-weight: 500; opacity: 0.85; margin-left: 0.3em; }
    .buy-back { color: var(--text-dim); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; }
    .buy-back:hover { color: var(--text); }

    .buy-wrap { max-width: 980px; margin: 1rem auto 4rem; padding: 0 1.5rem; }

    .buy-eyebrow { display: inline-flex; align-items: center; gap: 6px; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #6fcf97; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; margin-bottom: 1rem; }
    .buy-eyebrow::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--green-bright); box-shadow: 0 0 8px rgba(74,222,128,0.7); }
    .buy-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(2.4rem, 5vw, 3.4rem); font-weight: 800; color: #fff; margin-bottom: 0.5rem; }
    .buy-sub { color: var(--text-mid); font-size: 1.1rem; margin-bottom: 2.5rem; max-width: 640px; }

    /* Two-column layout: product summary left, payment form right */
    .buy-grid { display: grid; grid-template-columns: 1fr 1.05fr; gap: 1.5rem; align-items: start; }

    .buy-card { background: linear-gradient(155deg, rgba(34,162,77,0.10) 0%, rgba(34,162,77,0.02) 100%); border: 1px solid rgba(34,162,77,0.3); border-radius: 20px; padding: 1.9rem 1.8rem; box-shadow: 0 24px 60px rgba(0,0,0,0.4); }
    .buy-card-head { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.4rem; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .buy-product { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; line-height: 1.15; }
    .buy-price { display: flex; align-items: baseline; gap: 0.4rem; flex-wrap: wrap; }
    .buy-price .amount { font-family: 'Barlow Condensed', sans-serif; font-size: 2.6rem; font-weight: 800; color: #fff; line-height: 1; }
    .buy-price .unit { color: var(--text-mid); font-size: 0.9rem; font-weight: 500; }
    .buy-savings { color: var(--green-bright); font-size: 0.78rem; font-weight: 700; background: rgba(34,162,77,0.13); border: 1px solid rgba(34,162,77,0.35); padding: 3px 10px; border-radius: 100px; margin-left: 0.4rem; white-space: nowrap; }

    .buy-section-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; color: var(--green-bright); margin-bottom: 0.8rem; }
    .buy-features { list-style: none; padding: 0; margin: 0 0 1.4rem; }
    .buy-features li { font-size: 0.95rem; color: var(--text-mid); padding: 0.4rem 0 0.4rem 1.7rem; position: relative; line-height: 1.5; }
    .buy-features li::before { content: "✓"; position: absolute; left: 0; top: 0.4rem; color: var(--green-bright); font-weight: 800; }

    /* Payment form card */
    .pay-card { background: var(--bg-raised); border: 1px solid var(--border-bright); border-radius: 20px; padding: 1.9rem 1.8rem; box-shadow: 0 24px 60px rgba(0,0,0,0.4); position: sticky; top: 1.5rem; }
    .pay-card h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem; }
    .pay-card .lede { color: var(--text-mid); font-size: 0.92rem; margin-bottom: 1.4rem; }

    .field-label { display: block; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 0.5rem; }
    .field-input { width: 100%; padding: 0.85rem 0.95rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border-bright); border-radius: 10px; color: #fff; font-family: inherit; font-size: 0.98rem; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .field-input:focus { border-color: rgba(34,162,77,0.6); box-shadow: 0 0 0 3px rgba(34,162,77,0.15); }
    .field-group { margin-bottom: 1.1rem; }

    /* Square Web Payments SDK card container */
    #card-container { background: rgba(0,0,0,0.3); border: 1px solid var(--border-bright); border-radius: 10px; padding: 0.5rem 0.75rem; min-height: 56px; transition: border-color 0.2s, box-shadow 0.2s; }
    #card-container.focused { border-color: rgba(34,162,77,0.6); box-shadow: 0 0 0 3px rgba(34,162,77,0.15); }

    .pay-button {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: var(--green); color: #fff; border: none;
      padding: 1.05rem 1.4rem; border-radius: 12px;
      font-family: inherit; font-weight: 700; font-size: 1.05rem;
      cursor: pointer; transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 10px 28px rgba(34,162,77,0.3);
      margin-top: 0.4rem;
    }
    .pay-button:hover:not(:disabled) { background: #1f924a; transform: translateY(-1px); box-shadow: 0 14px 36px rgba(34,162,77,0.4); }
    .pay-button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .pay-button .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .form-error { background: rgba(255,138,138,0.08); border: 1px solid rgba(255,138,138,0.35); border-radius: 10px; padding: 0.7rem 0.95rem; color: var(--red); font-size: 0.88rem; line-height: 1.4; margin-top: 0.9rem; }

    .pay-fineprint { font-size: 0.78rem; color: var(--text-dim); margin-top: 1rem; line-height: 1.55; text-align: center; }
    .pay-fineprint a { color: #6fcf97; text-decoration: none; }
    .pay-fineprint a:hover { text-decoration: underline; }

    .trust-row { display: flex; gap: 1rem; margin-top: 1.2rem; padding-top: 1.2rem; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .trust-row .trust { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-dim); }

    /* Success state */
    .success-card { text-align: center; padding: 1rem 0.5rem; }
    .success-icon { width: 80px; height: 80px; margin: 0.5rem auto 1.2rem; border-radius: 50%; background: rgba(74,222,128,0.18); display: flex; align-items: center; justify-content: center; font-size: 2.4rem; border: 2px solid rgba(74,222,128,0.5); }
    .success-card h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.1rem; font-weight: 800; color: #fff; margin-bottom: 0.4rem; }
    .success-card .sub { color: var(--text-mid); font-size: 1rem; margin-bottom: 1.6rem; }
    .success-next { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; margin: 1.2rem 0; text-align: left; font-size: 0.92rem; color: var(--text-mid); }
    .success-next strong { color: #fff; font-weight: 600; }
    .success-actions { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.4rem; }
    .success-actions a { padding: 0.85rem 1.2rem; border-radius: 10px; font-weight: 700; font-size: 0.95rem; text-decoration: none; transition: background 0.2s, transform 0.15s; }
    .success-actions .primary { background: var(--green); color: #fff; }
    .success-actions .primary:hover { background: #1f924a; transform: translateY(-1px); }
    .success-actions .secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border-bright); }
    .success-actions .secondary:hover { background: rgba(255,255,255,0.1); }

    .buy-footer { text-align: center; margin-top: 2.5rem; color: var(--text-dim); font-size: 0.88rem; }
    .buy-footer a { color: #6fcf97; text-decoration: none; font-weight: 600; }
    .buy-footer a:hover { text-decoration: underline; }

    .buy-loading { text-align: center; padding: 5rem 1rem; color: var(--text-dim); }
    .buy-error { background: rgba(226,74,74,0.1); border: 1px solid rgba(226,74,74,0.35); border-radius: 12px; padding: 1.5rem; color: var(--red); text-align: center; }

    .test-banner { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.4); border-radius: 10px; color: #f5a623; padding: 0.7rem 1rem; font-size: 0.85rem; font-weight: 600; text-align: center; margin-bottom: 1.5rem; }

    @media (max-width: 900px) {
      .buy-grid { grid-template-columns: 1fr; }
      .pay-card { position: static; }
    }
    @media (max-width: 640px) {
      .buy-nav { padding: 1rem 1.2rem; }
      .buy-brand .name { font-size: 1.1rem; }
      .buy-brand img { width: 48px; height: 48px; }
      .buy-card, .pay-card { padding: 1.5rem 1.4rem; border-radius: 16px; }
      .buy-card-head { flex-direction: column; align-items: flex-start; }
      .buy-price .amount { font-size: 2.2rem; }
      .pay-button { font-size: 1rem; }
    }
  </style>
</head>
<body>

<script>

    },

      ],

    },
    gift_100: {
      eyebrow: "Gift Card",
      title: "qmtk Gift Card — $100",
      sub: "Give the gift of professional soccer development. Redeemable for any qmtk service.",
      unit: "",
      features: [
        "Redeemable for any qmtk Soccer service",
        "Delivered digitally to the recipient",
        "Perfect for birthdays, holidays, or end-of-season gifts",
        "No expiration"
      ],
      ctaPrefix: "Pay"
    },
    gift_200: {
      eyebrow: "Gift Card",
      title: "qmtk Gift Card — $200",
      sub: "Give the gift of professional soccer development. Redeemable for any qmtk service.",
      unit: "",
      features: [
        "Redeemable for any qmtk Soccer service",
        "Covers a private session plus extra credit toward more",
        "Delivered digitally to the recipient",
        "Perfect for birthdays, holidays, or end-of-season gifts",
        "No expiration"
      ],
      ctaPrefix: "Pay"
    }
  };

  // Square Application IDs (public identifiers — safe in client code)
  var APP_IDS = {
    sandbox: "sandbox-sq0idb-ZTHHrrck2shrdEx1zqabZA",
    production: "sq0idp-yaRqgCyyyNwODi6723EH8w"
  };

  function dollars(c) { return "$" + (c / 100).toLocaleString(); }
  function escapeHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function param(k) { return new URLSearchParams(window.location.search).get(k); }
  function track(e, p) { if (typeof fbq !== "undefined") fbq("track", e, p || {}); }

  function loadScript(src) {
    return new Promise(function(resolve, reject) {
      var s = document.createElement("script");
      s.src = src;
      s.async = true;
      s.onload = function() { resolve(); };
      s.onerror = function() { reject(new Error("Failed to load " + src)); };
      document.head.appendChild(s);
    });
  }

  var STATE = { product: null, copy: null, env: null, card: null, payments: null, submitting: false };

  function init() {
    var key = param("p");
    var root = document.getElementById("buy-root");
    if (!key || !COPY[key]) {
      root.innerHTML = '<div class="buy-error">Product not found. <a href="/" style="color:#6fcf97;">Return to the homepage</a> to browse our offerings.</div>';
      return;
    }
    STATE.copy = COPY[key];

    fetch("/square-products.json", { cache: "no-store" })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var product = (data.products || []).find(function(p) { return p.key === key; });
        if (!product) throw new Error("Product not in catalog");
        STATE.product = product;
        STATE.env = data.env === "sandbox" ? "sandbox" : "production";
        renderPage();
        return loadSquareSDK();
      })
      .then(initPaymentForm)
      .catch(function(err) {
        console.error(err);
        var root = document.getElementById("buy-root");
        if (root && !document.getElementById("pay-card")) {
          root.innerHTML = '<div class="buy-error">Checkout is temporarily unavailable. Please <a href="mailto:noah@qmtk.org" style="color:#6fcf97;">email Coach Shaya</a> and we\'ll set you up directly.</div>';
        }
      });
  }

  function renderPage() {
    var p = STATE.product;
    var c = STATE.copy;
    document.getElementById("page-title").textContent = p.name + " | qmtk Soccer";

    var savingHtml = c.saving ? '<span class="buy-savings">' + escapeHtml(c.saving) + '</span>' : "";
    var testBanner = STATE.env === "sandbox" ? '<div class="test-banner">🧪 Test mode — payments are sandbox only, no real card will be charged.</div>' : "";
    var features = c.features.map(function(f) { return "<li>" + f + "</li>"; }).join("");

    document.getElementById("buy-root").innerHTML = ''
      + testBanner
      + '<div class="buy-eyebrow">' + escapeHtml(c.eyebrow) + '</div>'
      + '<h1 class="buy-title">' + escapeHtml(c.title) + '</h1>'
      + '<p class="buy-sub">' + escapeHtml(c.sub) + '</p>'
      + '<div class="buy-grid">'
      +   '<div class="buy-card">'
      +     '<div class="buy-card-head">'
      +       '<div class="buy-product">' + escapeHtml(p.name) + '</div>'
      +       '<div class="buy-price"><span class="amount">' + dollars(p.price_cents) + '</span><span class="unit">' + escapeHtml(c.unit) + '</span>' + savingHtml + '</div>'
      +     '</div>'
      +     '<div class="buy-section-label">What\'s included</div>'
      +     '<ul class="buy-features">' + features + '</ul>'
      +     '<div class="trust-row">'
      +       '<span class="trust">🔐 Encrypted by Square</span>'
      +       '<span class="trust">📧 Instant receipt</span>'
      +       '<span class="trust">↩️ Full refund if not a fit</span>'
      +     '</div>'
      +   '</div>'

      +   '<div class="pay-card" id="pay-card">'
      +     '<h2>Pay ' + dollars(p.price_cents) + '</h2>'
      +     '<p class="lede">Secure checkout — your card is encrypted by Square. We never see your card details.</p>'
      +     '<form id="pay-form" novalidate>'
      +       '<div class="field-group">'
      +         '<label class="field-label" for="email">Email for receipt</label>'
      +         '<input class="field-input" type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>'
      +       '</div>'
      +       '<div class="field-group">'
      +         '<label class="field-label">Card details</label>'
      +         '<div id="card-container"></div>'
      +       '</div>'
      +       '<button type="submit" class="pay-button" id="pay-button" disabled>'
      +         '<span id="pay-button-label">Loading secure form…</span>'
      +       '</button>'
      +       '<div id="form-error" class="form-error" style="display:none;"></div>'
      +     '</form>'
      +     '<p class="pay-fineprint">Having trouble? <a href="mailto:noah@qmtk.org">Email us</a> and we\'ll handle it directly.</p>'
      +   '</div>'
      + '</div>'
      + '<div class="buy-footer">Questions before you buy? <a href="mailto:noah@qmtk.org">Email Coach Shaya</a> &middot; <a href="/">Back to qmtk.org</a></div>';
  }

  function loadSquareSDK() {
    var sdkUrl = STATE.env === "sandbox"
      ? "https://sandbox.web.squarecdn.com/v1/square.js"
      : "https://web.squarecdn.com/v1/square.js";
    return loadScript(sdkUrl);
  }

  function initPaymentForm() {
    if (typeof Square === "undefined") {
      showFormError("Payment form failed to load. Please refresh the page.");
      return;
    }
    var appId = APP_IDS[STATE.env];
    fetch("/square-products.json", { cache: "no-store" })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        return initCard(appId, data.location_id);
      })
      .catch(function(err) {
        console.error("Square SDK init failed:", err);
        var msg = (err && err.message) ? err.message : "Unknown error";
        var hint = "";
        if (/domain/i.test(msg) || /authoriz/i.test(msg) || /allow/i.test(msg)) {
          hint = " — your domain may need to be added to the Square application's Web Payments SDK allow-list.";
        } else if (/applicationId/i.test(msg) && !/style/i.test(msg)) {
          hint = " — the application ID may be wrong for this environment.";
        }
        showFormError("Could not initialize secure card form: " + msg + hint);
      });
  }

  function initCard(appId, locationId) {
    var payments;
    try {
      payments = Square.payments(appId, locationId);
    } catch (err) {
      return Promise.reject(err);
    }
    STATE.payments = payments;
    return payments.card({
      style: {
        input: {
          color: "#ffffff",
          fontFamily: "Inter, sans-serif",
          fontSize: "16px",
          fontWeight: "500",
          placeholderColor: "#7a8c80"
        },
        ".input-container": { borderRadius: "8px", borderColor: "transparent" },
        ".input-container.is-focus": { borderColor: "transparent" },
        ".input-container.is-error": { borderColor: "#ff8a8a" },
        ".message-text": { color: "#ff8a8a" },
        ".message-icon": { color: "#ff8a8a" }
      }
    }).then(function(card) {
      STATE.card = card;
      return card.attach("#card-container");
    }).then(function() {
      var btn = document.getElementById("pay-button");
      btn.disabled = false;
      document.getElementById("pay-button-label").textContent = "🔒 Pay " + dollars(STATE.product.price_cents);
      document.getElementById("pay-form").addEventListener("submit", handleSubmit);
      // focus highlight on card container
      STATE.card.addEventListener("focusClassAdded", function() {
        document.getElementById("card-container").classList.add("focused");
      });
      STATE.card.addEventListener("focusClassRemoved", function() {
        document.getElementById("card-container").classList.remove("focused");
      });
    });
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (STATE.submitting) return;
    hideFormError();

    var email = document.getElementById("email").value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showFormError("Please enter a valid email address for your receipt.");
      document.getElementById("email").focus();
      return;
    }

    setSubmitting(true);

    STATE.card.tokenize().then(function(result) {
      if (result.status !== "OK") {
        var msg = result.errors && result.errors[0] && result.errors[0].message
          ? result.errors[0].message
          : "Please check your card details.";
        showFormError(msg);
        setSubmitting(false);
        return null;
      }
      return fetch("/api/checkout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          source_id: result.token,
          product_key: STATE.product.key,
          buyer_email_address: email
        })
      }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); });
    }).then(function(resp) {
      if (!resp) return;
      if (!resp.ok || !resp.data.ok) {
        showFormError(resp.data.error || "Payment could not be completed. Please try a different card.");
        setSubmitting(false);
        return;
      }
      track("Purchase", {
        content_name: STATE.product.name,
        content_category: STATE.product.key.indexOf("gift_") === 0 ? "Gift Card" : (STATE.product.key === "intro_call" ? "Intro Call" : "Private Training"),
        value: STATE.product.price_cents / 100,
        currency: "USD"
      });
      showSuccess(resp.data);
    }).catch(function(err) {
      console.error(err);
      showFormError("Something went wrong. Please try again or email noah@qmtk.org.");
      setSubmitting(false);
    });
  }

  function setSubmitting(yes) {
    STATE.submitting = yes;
    var btn = document.getElementById("pay-button");
    var lbl = document.getElementById("pay-button-label");
    if (!btn || !lbl) return;
    btn.disabled = yes;
    if (yes) {
      btn.innerHTML = '<span class="spinner"></span> Processing…';
    } else {
      btn.innerHTML = '<span id="pay-button-label">🔒 Pay ' + dollars(STATE.product.price_cents) + '</span>';
    }
  }

  function showFormError(msg) {
    var el = document.getElementById("form-error");
    if (!el) return;
    el.textContent = msg;
    el.style.display = "";
  }
  function hideFormError() {
    var el = document.getElementById("form-error");
    if (el) el.style.display = "none";
  }

  function showSuccess(data) {
    var p = STATE.product;
    var k = p.key;
    var nextStepsMap = {
      intro_call: "Coach Shaya will reach out within 24 hours at the email you provided to schedule your intro call.",
      private_1:  "Coach Shaya will reach out within 24 hours to schedule your session at a time and location that works for your family.",
      private_5:  "Coach Shaya will reach out within 24 hours to schedule your first session. You can book the rest one at a time.",
      private_10: "Coach Shaya will reach out within 24 hours to schedule your first session. Book the rest at your pace.",
      gift_50:    "Email noah@qmtk.org with the recipient's name and email, and we'll send a personalized gift card.",
      gift_100:   "Email noah@qmtk.org with the recipient's name and email, and we'll send a personalized gift card.",
      gift_200:   "Email noah@qmtk.org with the recipient's name and email, and we'll send a personalized gift card."
    };
    var nextSteps = nextStepsMap[k] || "Coach Shaya will reach out shortly.";

    var root = document.getElementById("buy-root");
    root.innerHTML = ''
      + '<div class="buy-card" style="max-width:560px; margin:0 auto;">'
      +   '<div class="success-card">'
      +     '<div class="success-icon">⚽</div>'
      +     '<h2>You\'re in!</h2>'
      +     '<p class="sub">' + escapeHtml(p.name) + ' &middot; ' + dollars(data.amount_cents || p.price_cents) + ' charged.</p>'
      +     (data.receipt_url ? '<p class="sub" style="font-size:0.9rem;">Receipt: <a href="' + escapeHtml(data.receipt_url) + '" target="_blank" rel="noopener" style="color:#6fcf97;">View on Square →</a></p>' : '')
      +     '<div class="success-next">'
      +       '<strong>What happens next:</strong> ' + escapeHtml(nextSteps)
      +     '</div>'
      +     '<div class="success-actions">'
      +       '<a class="primary" href="/">Back to qmtk.org</a>'
      +       '<a class="secondary" href="mailto:noah@qmtk.org">Email Coach Shaya</a>'
      +     '</div>'
      +   '</div>'
      + '</div>';
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  init();
</script>
